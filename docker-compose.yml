services:
  item-service:
    build:
      context: ./item-service
    container_name: item-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    networks:
      - microservices-net

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    environment:
      - ASPNETCORE_URLS=http://+:8083
    ports:
      - "8083:8083"
    networks:
      - microservices-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    depends_on:
      - item-service
      - order-service
      - payment-service
    ports:
      - "8080:8080"
    networks:
      - microservices-net

networks:
  microservices-net:
    name: microservices-net
    driver: bridge
